<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WatTheHex | Tool Template</title>
  <link rel="stylesheet" href="../../style.css">
  <script src="../../vendor/aqua-neo/aqua-neo.js" defer></script>
  <script src="../../storage.js" defer></script>
  <script src="../../site-transitions.js" defer></script>
</head>
<body>
  <div class="page-shell tool-page">
    <header class="site-header aqua-top-bar" data-top-bar-sticky data-top-bar-auto-hide>
      <a class="aqua-top-bar-brand site-title-link" href="/" data-local-home>
        <span class="aqua-top-bar-title">WatTheHex</span>
      </a>
      <nav class="aqua-top-bar-menu aqua-text-button-group menu-bar" aria-label="Site sections">
        <a class="aqua-text-button" href="/" data-local-home aria-pressed="false">Home</a>
        <a class="aqua-text-button" href="/tools.html" data-local-tools aria-pressed="true" aria-current="page">Tools</a>
        <a class="aqua-text-button" href="/about.html" data-local-about aria-pressed="false">About</a>
      </nav>
      <div class="aqua-top-bar-actions">
        <a
          class="graphite-button site-feedback-link"
          href="https://docs.google.com/forms/d/e/1FAIpQLSdeyjPCdSfqUNAQWeigzAkdpXYYlOFtl0q8SgipIK58Tz-mqg/viewform?usp=publish-editor"
          target="_blank"
          rel="noopener noreferrer"
        >Feedback</a>
      </div>
    </header>

    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a class="breadcrumb-link" href="/tools.html" data-local-tools>Tools</a>
      <span class="breadcrumb-separator" aria-hidden="true">&gt;</span>
      <span>ECE 250</span>
      <span class="breadcrumb-separator" aria-hidden="true">&gt;</span>
      <span aria-current="page">Red-Black Tree Visualizer</span>
    </nav>

    <section class="tool-page-intro">
      <h1 class="tool-page-title">Red-Black Tree Visualizer</h1>
      <p class="tool-page-description">Step through insertions, rotations, and recoloring for balanced tree operations.</p>
    </section>

    <main class="tool-page-main">
      <div class="tool-placeholder">
        <p>Build the tool UI here.</p>
      </div>
    </main>

    <footer class="tool-page-footer">
      <a class="tool-chip tool-footer-link" href="../../tools.html?course=ECE+250">ECE 250</a>
      <a class="tool-term tool-footer-link" href="../../tools.html?term=2A">2A</a>
    </footer>
  </div>

  <script>
    if (window.location.protocol === "file:") {
      document.querySelectorAll("[data-local-home]").forEach((link) => {
        link.setAttribute("href", "../../index.html");
      });

      document.querySelectorAll("[data-local-tools]").forEach((link) => {
        link.setAttribute("href", "../../tools.html");
      });
      document.querySelectorAll("[data-local-about]").forEach((link) => {
        link.setAttribute("href", "../../about.html");
      });
    }
  </script>
</body>
</html>
