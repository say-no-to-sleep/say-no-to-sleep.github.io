<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-label="Light Frutiger Aero abstract background">
  <defs>
    <radialGradient id="skyGlow" cx="34%" cy="18%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="42%" stop-color="#b9f2ff"/>
      <stop offset="74%" stop-color="#58c9f0"/>
      <stop offset="100%" stop-color="#1486ce"/>
    </radialGradient>
    <linearGradient id="horizon" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f9fffb"/>
      <stop offset="38%" stop-color="#9ff4d6"/>
      <stop offset="70%" stop-color="#28b8be"/>
      <stop offset="100%" stop-color="#0872bc"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eaff9e"/>
      <stop offset="48%" stop-color="#70df6b"/>
      <stop offset="100%" stop-color="#159a67"/>
    </linearGradient>
    <linearGradient id="ribbonBlue" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="32%" stop-color="#f5ffff" stop-opacity="0.72"/>
      <stop offset="64%" stop-color="#69d8ff" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
