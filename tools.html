<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WatTheHex | Tools</title>
  <link rel="stylesheet" href="style.css">
  <script src="aqua2.js" defer></script>

  <div class="page-shell">

      <div class="top-bar">
        <a class="site-title-link" href="index.html">WatTheHex</a>
        <nav class="menu-bar" aria-label="Primary">
